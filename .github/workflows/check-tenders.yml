name: Check Tenders

on:
  schedule:
    # Runs every 3 hours, all day, every day (times are in UTC).
    - cron: "0 */3 * * *"
  workflow_dispatch:
    # Lets you click "Run workflow" on GitHub to test it manually any time.
    inputs:
      send_test_alert:
        description: "Send a test email/Telegram message instead of checking tenders"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  check-tenders:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tender checker
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAILS: ${{ secrets.ALERT_EMAILS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TEST_ALERT: ${{ github.event.inputs.send_test_alert }}
        run: python check_tenders.py

      - name: Save updated "already seen" list
        run: |
          git config user.name "tender-alert-bot"
          git config user.email "actions@github.com"
          git add seen_tenders.json last_run_summary.json
          git diff --staged --quiet || git commit -m "Update seen tenders list"
          git push
